<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamy Ghost Forest Adventure</title>

<style>

body{
margin:0;
overflow-x:hidden;
font-family:Arial, sans-serif;
background:#021c1a;
color:white;
}

#scene{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,#063d36,#021c1a);
}

/* story text */

#story{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:20px;
z-index:20;
}

/* controls */

#controls{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
z-index:20;
}

button{
background:rgba(255,255,255,0.15);
border:none;
padding:14px 18px;
border-radius:12px;
color:white;
font-size:18px;
cursor:pointer;
}

/* ghost */

#ghost{
position:absolute;
left:50%;
top:50%;
width:32px;
height:32px;
transform:translate(-50%,-50%);
z-index:10;
}

.ghost-body{
width:100%;
height:100%;
background:white;
border-radius:50% 50% 15% 15%;
box-shadow:0 0 10px white;
}

.eye{
position:absolute;
width:4px;
height:6px;
background:black;
top:10px;
}

.eye.left{left:9px;}
.eye.right{right:9px;}

@keyframes wiggle{
0%{transform:rotate(0deg);}
25%{transform:rotate(-4deg);}
50%{transform:rotate(4deg);}
75%{transform:rotate(-4deg);}
100%{transform:rotate(0deg);}
}

.wiggle{
animation:wiggle 0.6s;
}

/* mushrooms */

.mushroom{
position:absolute;
width:12px;
height:10px;
background:red;
border-radius:6px 6px 0 0;
}

.mushroom::after{
content:"";
position:absolute;
bottom:-6px;
left:4px;
width:4px;
height:6px;
background:white;
}

@keyframes wobble{
0%{transform:rotate(-2deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(-2deg);}
}

.mushroom{
animation:wobble 2s infinite;
}

/* trees */

.tree{
position:absolute;
width:12px;
height:30px;
}

.tree::before{
content:"";
position:absolute;
bottom:0;
left:4px;
width:4px;
height:12px;
background:#4a2f1b;
}

.tree::after{
content:"";
position:absolute;
bottom:10px;
left:-6px;
width:24px;
height:20px;
background:#0d5c3a;
border-radius:50%;
}

/* grass */

.grass{
position:absolute;
width:6px;
height:6px;
background:#2fa36b;
}

@keyframes sway{
0%{transform:rotate(-5deg);}
50%{transform:rotate(5deg);}
100%{transform:rotate(-5deg);}
}

.grass{
animation:sway 3s infinite;
}

/* flowers */

.flower{
position:absolute;
width:6px;
height:6px;
background:pink;
border-radius:50%;
animation:sway 3s infinite;
}

/* fireflies */

.firefly{
position:absolute;
width:3px;
height:3px;
background:#ffffaa;
border-radius:50%;
box-shadow:0 0 6px #ffffaa;
animation:fly 8s linear infinite;
}

@keyframes fly{
0%{transform:translate(0,0);}
50%{transform:translate(30px,-40px);}
100%{transform:translate(-20px,30px);}
}

/* fog */

.fog{
position:absolute;
width:120px;
height:60px;
background:rgba(255,255,255,0.05);
border-radius:50%;
filter:blur(6px);
animation:drift 25s linear infinite;
}

@keyframes drift{
0%{transform:translateX(-200px);}
100%{transform:translateX(120vw);}
}

</style>
</head>

<body>

<div id="scene">

<div id="ghost" onclick="pokeGhost()">
<div class="ghost-body">
<div class="eye left"></div>
<div class="eye right"></div>
</div>
</div>

<div id="story">Tiny spores glow around you...</div>

<div id="controls">
<button onclick="move('left')">◀</button>
<button onclick="move('up')">▲</button>
<button onclick="move('down')">▼</button>
<button onclick="move('right')">▶</button>
</div>

</div>

<script>

let ghostName = prompt("Name your tiny ghost 👻")

if(!ghostName || ghostName.trim()===""){
ghostName="Mochi"
}

document.getElementById("story").innerText =
"You meet a tiny ghost named " + ghostName + "..."

let ghost=document.getElementById("ghost")

let x=window.innerWidth/2
let y=window.innerHeight/2

function move(direction){

let step=20

if(direction==="left") x-=step
if(direction==="right") x+=step
if(direction==="up") y-=step
if(direction==="down") y+=step

ghost.style.left=x+"px"
ghost.style.top=y+"px"

}

/* ghost wiggle */

function pokeGhost(){

ghost.classList.add("wiggle")

setTimeout(()=>{
ghost.classList.remove("wiggle")
},600)

document.getElementById("story").innerText =
ghostName + " wiggles happily 👻"

}

/* random generator */

function randomItem(className,count){

for(let i=0;i<count;i++){

let el=document.createElement("div")
el.className=className

el.style.left=Math.random()*100+"vw"
el.style.top=Math.random()*100+"vh"

document.getElementById("scene").appendChild(el)

}

}

/* dense forest */

randomItem("tree",60)
randomItem("mushroom",80)
randomItem("grass",120)
randomItem("flower",60)
randomItem("firefly",40)
randomItem("fog",10)

</script>

</body>
</html>
