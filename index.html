<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamy Ghost Forest Adventure</title>

<style>

body{
margin:0;
overflow-x:hidden;
font-family:Arial, sans-serif;
background:#021c1a;
color:white;
}

#scene{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,#063d36,#021c1a);
}

/* glowing spores */

.spore{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:0 0 8px white;
animation:float 6s infinite alternate;
}

@keyframes float{
from{transform:translateY(0px);}
to{transform:translateY(-40px);}
}

/* center text */

#story{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:20px;
}

/* controls */

#controls{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

button{
background:rgba(255,255,255,0.15);
border:none;
padding:14px 18px;
border-radius:12px;
color:white;
font-size:18px;
cursor:pointer;
backdrop-filter:blur(5px);
}

button:hover{
background:rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<div id="scene">

<div id="story">
Tiny spores glow around you...
</div>

<div id="controls">
<button onclick="move('left')">◀</button>
<button onclick="move('up')">▲</button>
<button onclick="move('down')">▼</button>
<button onclick="move('right')">▶</button>
</div>

</div>

<script>

/* generate glowing spores */

for(let i=0;i<80;i++){

let spore=document.createElement("div")
spore.className="spore"

spore.style.left=Math.random()*100+"vw"
spore.style.top=Math.random()*100+"vh"

spore.style.animationDuration=(4+Math.random()*6)+"s"

document.getElementById("scene").appendChild(spore)

}

/* movement text */

function move(direction){

let text=document.getElementById("story")

if(direction==="left"){
text.innerText="You walk deeper into the whispering trees..."
}

if(direction==="right"){
text.innerText="A pale ghost flickers between the branches..."
}

if(direction==="up"){
text.innerText="Soft wind carries glowing spores above..."
}

if(direction==="down"){
text.innerText="The forest floor hums with strange magic..."
}

}

</script>

</body>
</html>
