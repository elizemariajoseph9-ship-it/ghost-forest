<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamy Ghost Forest Adventure</title>

<style>

body{
margin:0;
overflow-x:hidden;
font-family:Arial, sans-serif;
background:#021c1a;
color:white;
}

#scene{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,#063d36,#021c1a);
}

/* glowing spores */

.spore{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:0 0 8px white;
animation:float 6s infinite alternate;
}

@keyframes float{
from{transform:translateY(0px);}
to{transform:translateY(-40px);}
}

/* story text */

#story{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:20px;
}

/* controls */

#controls{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

button{
background:rgba(255,255,255,0.15);
border:none;
padding:14px 18px;
border-radius:12px;
color:white;
font-size:18px;
cursor:pointer;
backdrop-filter:blur(5px);
}

/* ghost */

#ghost{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:32px;
height:32px;
cursor:pointer;
z-index:10;
}

/* ghost body */

.ghost-body{
position:relative;
width:100%;
height:100%;
background:white;
border-radius:50% 50% 12% 12%;
box-shadow:0 0 10px rgba(255,255,255,0.8);
}

/* eyes */

.eye{
position:absolute;
width:4px;
height:6px;
background:black;
top:10px;
}

.eye.left{ left:9px; }
.eye.right{ right:9px; }

/* wiggle animation */

@keyframes wiggle{
0%{ transform:translate(-50%,-50%) rotate(0deg); }
25%{ transform:translate(-50%,-52%) rotate(-4deg); }
50%{ transform:translate(-50%,-50%) rotate(4deg); }
75%{ transform:translate(-50%,-52%) rotate(-4deg); }
100%{ transform:translate(-50%,-50%) rotate(0deg); }
}

.wiggle{
animation:wiggle 0.6s ease;
}

</style>
</head>

<body>

<div id="scene">

<div id="ghost" onclick="pokeGhost()">
  <div class="ghost-body">
    <div class="eye left"></div>
    <div class="eye right"></div>
  </div>
</div>

<div id="story">
Tiny spores glow around you...
</div>

<div id="controls">
<button onclick="move('left')">◀</button>
<button onclick="move('up')">▲</button>
<button onclick="move('down')">▼</button>
<button onclick="move('right')">▶</button>
</div>

</div>

<script>

/* ask for ghost name */

let ghostName = prompt("Name your tiny ghost 👻")

if(!ghostName || ghostName.trim()===""){
ghostName="Mochi"
}

document.getElementById("story").innerText =
"You meet a tiny ghost named " + ghostName + "..."



/* spores */

for(let i=0;i<80;i++){

let spore=document.createElement("div")
spore.className="spore"

spore.style.left=Math.random()*100+"vw"
spore.style.top=Math.random()*100+"vh"

spore.style.animationDuration=(4+Math.random()*6)+"s"

document.getElementById("scene").appendChild(spore)

}



/* ghost interaction */

function pokeGhost(){

let ghost=document.getElementById("ghost")

ghost.classList.add("wiggle")

setTimeout(()=>{
ghost.classList.remove("wiggle")
},600)

document.getElementById("story").innerText =
ghostName + " wiggles happily 👻"

}



/* movement */

function move(direction){

let text=document.getElementById("story")

if(direction==="left"){
text.innerText=ghostName + " drifts deeper into the whispering forest..."
}

if(direction==="right"){
text.innerText="A pale light flickers between the trees..."
}

if(direction==="up"){
text.innerText=ghostName + " floats under glowing spores..."
}

if(direction==="down"){
text.innerText="The forest floor hums with strange magic..."
}

}

</script>

</body>
</html>
